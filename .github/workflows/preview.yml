name: Preview

on:
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to build a preview for (e.g. 42)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: preview-pr-${{ inputs.pr }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ inputs.pr }}/head

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PR: ${{ inputs.pr }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          short_sha=$(git rev-parse --short HEAD)
          version="v0.0.0-preview-pr${PR}-${short_sha}"
          go build \
            -ldflags="-X 'github.com/AndrewADev/bight/cmd.ldVersion=${version}'" \
            -o "bight-${GOOS}-${GOARCH}${ext}" .

      - uses: actions/upload-artifact@v7
        with:
          name: bight-preview-pr${{ inputs.pr }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bight-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 14
          if-no-files-found: error

  checksums:
    name: Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          pattern: bight-preview-pr${{ inputs.pr }}-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - uses: actions/upload-artifact@v7
        with:
          name: bight-preview-pr${{ inputs.pr }}-checksums
          path: dist/checksums.txt
          retention-days: 14
          if-no-files-found: error
