name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            version="${{ github.ref_name }}"
          else
            short_sha="${{ github.sha }}"
            version="${short_sha:0:7}"
          fi
          go build \
            -ldflags="-X 'github.com/AndrewADev/bight/cmd.ldVersion=${version}'" \
            -o "bight-${GOOS}-${GOARCH}${ext}" .

      - uses: actions/upload-artifact@v7
        with:
          name: bight-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bight-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist
          sha256sum * > checksums.txt

      - uses: taiki-e/install-action@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tool: git-cliff@2

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git-cliff --tag "${{ github.ref_name }}" --latest --output release-notes.md

      - name: Publish semver release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/* \
            --repo "$REPO" \
            --title "$TAG" \
            --notes-file release-notes.md

      - name: Publish rolling latest
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh release delete latest --repo "$REPO" --yes 2>/dev/null || true
          gh release create latest dist/* \
            --repo "$REPO" \
            --title "${{ github.sha }}" \
            --notes "Latest build from \`main\`. Not for production use." \
            --prerelease \
            --target "${{ github.sha }}"

  update-tap:
    name: Update Homebrew tap
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    uses: AndrewADev/homebrew-tap/.github/workflows/update-formula.yml@main
    with:
      version: ${{ github.ref_name }}
    secrets:
      tap_token: ${{ secrets.TAP_GITHUB_TOKEN }}
