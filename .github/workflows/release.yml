name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build -o "bight-${GOOS}-${GOARCH}${ext}" .

      - uses: actions/upload-artifact@v7
        with:
          name: bight-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bight-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh release delete nightly --repo "$REPO" --yes 2>/dev/null || true
          gh release create nightly dist/* \
            --repo "$REPO" \
            --title "${{ github.sha }}" \
            --notes "Latest nightly build from \`main\`. Not for production use." \
            --prerelease \
            --target "${{ github.sha }}"
